<!doctype html><html><head><meta charset="utf-8"><title>status — plain</title><style>
  *{margin:0;box-sizing:border-box;font-family:Inter,-apple-system,sans-serif}
  body{background:#fff;color:#111827;text-align:center}
  .head{padding:80px 24px 40px}
  .pill{display:inline-block;background:#ecfdf5;color:#6ee7b7;padding:8px 18px;border-radius:9999px;font-size:15px;margin-bottom:20px}
  h1{font-size:48px;font-weight:800;letter-spacing:-.02em;background:linear-gradient(90deg,#10b981,#3b82f6);-webkit-background-clip:text;background-clip:text;color:transparent;margin:0 auto 12px;max-width:16ch}
  .sub{color:#9ca3af;font-size:18px;max-width:42ch;margin:0 auto}
  .cards{display:flex;gap:24px;justify-content:center;max-width:1000px;margin:40px auto;padding:0 24px}
  .card{flex:1;border:1px solid #f3f4f6;border-radius:20px;padding:28px;box-shadow:0 12px 40px rgba(0,0,0,.05)}
  .card h3{font-size:18px;margin-bottom:8px}.card p{color:#9ca3af;font-size:14px}
</style></head><body>
  <section class="head">
    <span class="pill">✅ All systems operational</span>
    <h1>Everything is running smoothly</h1>
    <p class="sub">Our world-class infrastructure keeps you online, always.</p>
  </section>
  <section class="cards">
    <div class="card"><h3>API</h3><p>Operational and blazing fast</p></div>
    <div class="card"><h3>Dashboard</h3><p>Operational and reliable</p></div>
    <div class="card"><h3>Webhooks</h3><p>Operational and secure</p></div>
  </section>
</body></html>
