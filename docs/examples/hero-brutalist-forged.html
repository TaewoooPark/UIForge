<!doctype html><html><head><meta charset="utf-8"><title>fonts — forged (brutalist)</title><style>
  /* forged to the brutalist reference: raw, high-contrast, huge display, ONE blue
     accent, sharp corners, asymmetric — no gradient, no center. */
  :root{--bg:#f4f3ee;--fg:#0a0a0a;--mut:#33332e;--accent:#1f39ff;--on:#fff;--s2:16px;--s3:24px;--s4:40px}
  *{margin:0;box-sizing:border-box;font-family:"Archivo",ui-sans-serif,sans-serif}
  body{background:var(--bg);color:var(--fg);line-height:1.4}
  .wrap{max-width:1120px;margin:0 auto;padding:52px var(--s4)}
  .top{display:flex;justify-content:space-between;border-bottom:3px solid var(--fg);padding-bottom:14px;font-weight:800;text-transform:uppercase;font-size:14px;letter-spacing:.05em}
  h1{font-size:88px;line-height:.94;font-weight:900;letter-spacing:-.035em;text-transform:uppercase;margin:var(--s4) 0 var(--s3);max-width:15ch}
  h1 em{font-style:normal;color:var(--accent)}
  .lede{font-size:20px;max-width:50ch;font-weight:500;color:var(--mut);margin-bottom:var(--s4)}
  .actions{display:flex;gap:var(--s3);align-items:center}
  .cta{display:inline-block;background:var(--accent);color:var(--on);text-decoration:none;padding:16px 32px;font-weight:800;text-transform:uppercase;font-size:16px;border:3px solid var(--fg)}
  .spec{font-family:"Space Mono",ui-monospace,monospace;font-size:15px;font-weight:700;border-bottom:3px solid var(--fg);padding-bottom:2px}
  .strip{margin-top:52px;border-top:3px solid var(--fg);padding-top:14px;display:flex;gap:var(--s4);font-weight:700;font-size:14px;text-transform:uppercase}
  .strip b{color:var(--accent)}
</style></head><body>
  <main class="wrap">
    <div class="top"><span>Monotype Yard</span><span>212 families</span></div>
    <h1>Metal for the <em>screen.</em></h1>
    <p class="lede">Monospace faces engineered for terminals that have to be legible at 11px and gorgeous at 200. Licensed per-weight, trials free.</p>
    <div class="actions">
      <a class="cta" href="#">Browse the yard</a>
      <span class="spec">42 weights · variable · woff2</span>
    </div>
    <div class="strip"><span><b>01</b> Ligatures</span><span><b>02</b> Powerline</span><span><b>03</b> 800 glyphs</span></div>
  </main>
</body></html>
